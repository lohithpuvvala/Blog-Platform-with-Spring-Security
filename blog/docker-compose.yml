version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: changemeinprod!
      MYSQL_DATABASE: blogdb
    ports:
      - "3307:3306"   # avoid local MySQL conflict
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: blog-adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    depends_on:
      - db

volumes:
  db_data: